<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button id="generate-btn">
        <i class="fas fa-sync-alt"></i>
        Generate Palette
      </button>
      <div class="palette-container">
        <!-- color box 1 -->
        <div class="color-box">
          <div class="color" style="background-color: #e1f5fe"></div>
          <div class="color-info">
            <span class="hex-value">#E1F5FE;</span>
            <i class="far fa-copy copy-btn" title="copy to clip board"></i>
          </div>
        </div>
        <!-- color box 2 -->
        <div class="color-box">
          <div class="color" style="background-color: #f5fee1"></div>
          <div class="color-info">
            <span class="hex-value">#F5FEE1;</span>
            <i class="far fa-copy copy-btn" title="copy to clip board"></i>
          </div>
        </div>
        <!-- color box 3 -->
        <div class="color-box">
          <div class="color" style="background-color: #e9e1fe"></div>
          <div class="color-info">
            <span class="hex-value">#E9E1FE;</span>
            <i class="far fa-copy copy-btn" title="copy to clip board"></i>
          </div>
        </div>
        <!-- color box 4 -->
        <div class="color-box">
          <div class="color" style="background-color: #e1fee6"></div>
          <div class="color-info">
            <span class="hex-value">#E1FEE6;</span>
            <i class="far fa-copy copy-btn" title="copy to clip board"></i>
          </div>
        </div>
        <!-- color box 5 -->
        <div class="color-box">
          <div class="color" style="background-color: #fee1e6"></div>
          <div class="color-info">
            <span class="hex-value">#FEE1E6;</span>
            <i class="far fa-copy copy-btn" title="copy to clip board"></i>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
